name: Build Kodi repo

on:
  push:
    branches: [main]
    paths:
      - "plugin.video.dontorrent/**"
      - "plugin.video.mejorwolf/**"
      - "script.elementum.spanish/**"
      - "repository.dontorrent/**"
      - "tools/build_repo.py"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build repo/
        run: python tools/build_repo.py

      - name: Commit repo/ if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo
          if git diff --cached --quiet; then
            echo "No changes to repo/"
          else
            git commit -m "ci: rebuild Kodi repo"
            git push
          fi

      - name: Read addon versions
        id: ver
        run: |
          MW_VER=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('plugin.video.mejorwolf/addon.xml').getroot().attrib['version'])")
          echo "mejorwolf=$MW_VER" >> $GITHUB_OUTPUT
          echo "MejorWolf version: $MW_VER"

      - name: Publish/refresh GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="mejorwolf-v${{ steps.ver.outputs.mejorwolf }}"
          MW_ZIP="repo/plugin.video.mejorwolf/plugin.video.mejorwolf-${{ steps.ver.outputs.mejorwolf }}.zip"
          REPO_ZIP=$(ls repo/repository.mejorwolf/repository.mejorwolf-*.zip 2>/dev/null | head -1)

          # Create release if it doesn't exist
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "MejorWolf $TAG" \
              --notes "Instala el repo descargando el zip de \`repository.mejorwolf\` adjunto. MejorWolf se actualiza solo una vez instalado el repo."
          fi

          # Upload assets (overwrite if existed). Skip missing files gracefully.
          for f in "$MW_ZIP" "$REPO_ZIP"; do
            if [ -n "$f" ] && [ -f "$f" ]; then
              gh release upload "$TAG" "$f" --clobber
            fi
          done
