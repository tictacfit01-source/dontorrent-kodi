name: Build Kodi repo

on:
  push:
    branches: [main]
    paths:
      - "plugin.video.dontorrent/**"
      - "repository.dontorrent/**"
      - "tools/build_repo.py"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build repo/
        run: python tools/build_repo.py

      - name: Commit repo/ if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo
          if git diff --cached --quiet; then
            echo "No changes to repo/"
          else
            git commit -m "ci: rebuild Kodi repo"
            git push
          fi

      - name: Read addon version
        id: ver
        run: |
          PLUGIN_VER=$(python -c "import xml.etree.ElementTree as ET; print(ET.parse('plugin.video.dontorrent/addon.xml').getroot().attrib['version'])")
          echo "plugin=$PLUGIN_VER" >> $GITHUB_OUTPUT
          echo "Plugin version: $PLUGIN_VER"

      - name: Publish/refresh GitHub Release for this version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v${{ steps.ver.outputs.plugin }}"
          PLUGIN_ZIP="repo/plugin.video.dontorrent/plugin.video.dontorrent-${{ steps.ver.outputs.plugin }}.zip"
          REPO_ZIP=$(ls repo/repository.dontorrent/repository.dontorrent-*.zip | head -1)

          # Create release if it doesn't exist
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "DonTorrent $TAG" \
              --notes "Instala/actualiza el repo descargando el zip de \`repository.dontorrent\` adjunto. El addon DonTorrent se actualiza automaticamente vez instalado el repo."
          fi

          # Upload assets (overwrite if existed)
          gh release upload "$TAG" "$PLUGIN_ZIP" "$REPO_ZIP" --clobber
