<style>
:root{--bg:#06070c;--card:rgba(255,255,255,.06);--stroke:rgba(255,255,255,.10);--txt:#f4f6fb;--sub:#8a93a6;--blue:#0a84ff;--blue2:#409cff;--green:#30d158}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif}
body{min-height:100vh;background:radial-gradient(1100px 600px at 50% -10%,#1b2740 0,transparent 60%),var(--bg)}
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 96px}
/* barra PREVIEW (no existe en la app real) */
.pvbar{max-width:760px;margin:0 auto 4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:rgba(10,132,255,.10);border:1px solid rgba(10,132,255,.35);border-radius:14px;padding:10px 12px}
.pvbar b{font-size:12px;letter-spacing:.5px;color:var(--blue2)}
.pvbar .seg{display:flex;background:rgba(255,255,255,.06);border:1px solid var(--stroke);border-radius:10px;overflow:hidden}
.pvbar .seg button{border:0;background:transparent;color:var(--sub);font-weight:700;font-size:12px;padding:7px 12px;cursor:pointer}
.pvbar .seg button.on{background:#f4f6fb;color:#0b1020}
.pvbar .rl{margin-left:auto;border:1px solid var(--stroke);background:var(--card);color:var(--txt);font-weight:700;font-size:12px;padding:7px 12px;border-radius:10px;cursor:pointer}
.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.brand{font-weight:800;font-size:19px;display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.brand .d{width:26px;height:26px;border-radius:9px;background:linear-gradient(145deg,var(--blue2),var(--blue));display:flex;align-items:center;justify-content:center;font-size:15px}
.code{width:96px;letter-spacing:3px;text-align:center;font-weight:600;background:rgba(255,255,255,.07);border:1px solid var(--stroke);color:var(--txt);border-radius:12px;padding:9px 8px;outline:0}
.tabs{display:flex;background:rgba(255,255,255,.05);border:1px solid var(--stroke);border-radius:14px;padding:4px;margin-bottom:14px}
.tab{flex:1;border:0;background:transparent;color:var(--sub);font-weight:600;font-size:15px;padding:11px;border-radius:10px;cursor:pointer}
.tab.on{color:#0b1020;background:#f4f6fb}
.chips{display:flex;gap:8px;margin-bottom:14px}
.chip{border:1px solid var(--stroke);background:var(--card);color:var(--txt);font-weight:600;font-size:14px;padding:10px 18px;border-radius:999px;cursor:pointer}
.chip.on{background:linear-gradient(145deg,var(--blue2),var(--blue));border-color:transparent;color:#fff}
.srclegend{display:flex;flex-wrap:wrap;gap:9px 14px;justify-content:center;margin:-2px 0 14px;font-size:11px;color:var(--sub)}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}

.card{background:var(--card);border:1px solid var(--stroke);border-radius:14px;overflow:hidden;transition:.15s}
.card:active{transform:scale(.97)}
.card .ph{position:relative;aspect-ratio:2/3;background:#0e1320 center/cover no-repeat;cursor:pointer}
.card .noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;font-size:12px;color:var(--sub)}
.card .tl{position:absolute;top:6px;left:6px;display:flex;flex-direction:column;gap:4px;align-items:flex-start;z-index:1}
.card .q{background:rgba(10,132,255,.85);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700}
.card .fav{position:absolute;top:5px;right:5px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;background:rgba(0,0,0,.4);border-radius:50%;cursor:pointer}
.card .m{padding:8px 9px;cursor:pointer}
.card .t{font-size:12.5px;font-weight:600;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .y{font-size:11px;color:var(--sub);margin-top:2px}
.card .kindtag{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.6);border:1px solid var(--stroke);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:#dfe6f2}
.card .srctag{position:absolute;bottom:6px;right:6px;border-radius:6px;padding:2px 7px;font-size:9px;font-weight:800;letter-spacing:.4px;box-shadow:0 2px 6px rgba(0,0,0,.45)}
.srctag.s-dt{background:#4a9eff;color:#04122b}
.card.in{animation:fadein .45s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* ===== ESQUELETOS (pulido de carga) ===== */
.skcard{background:var(--card);border:1px solid var(--stroke);border-radius:14px;overflow:hidden}
.skph{aspect-ratio:2/3;background:#0e1320;position:relative;overflow:hidden}
.skln{height:11px;margin:9px 9px 0;border-radius:6px;background:#0e1320;position:relative;overflow:hidden}
.skln.s2{width:60%;height:9px;margin-bottom:9px}
.shim::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);animation:sh 1.15s infinite}
@keyframes sh{100%{transform:translateX(100%)}}
.msg{color:var(--sub);text-align:center;padding:34px 10px;font-size:14px}

.sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:30}
.sheet.on{display:flex}
.sheet .box{width:100%;max-width:760px;margin:0 auto;background:#0e1320;border-top:1px solid var(--stroke);border-radius:20px 20px 0 0;animation:up .22s ease;max-height:93vh;overflow-y:auto;overflow-x:hidden}

.btn{display:block;width:100%;border:0;border-radius:14px;padding:16px;font-size:16px;font-weight:700;margin-top:10px;cursor:pointer}

   '<div class="kindtag">'+kindLabel(x.kind)+'</div><div class="srctag s-dt">DT</div>'+
   '<div class="fav" onclick="favTap('+i+',event)">'+fav+'</div></div>'+
   '<div class="m" onclick="openCard('+i+')"><div class="t">'+esc(x.title)+'</div><div class="y">'+star(x)+'</div></div></div>';
}
function renderGrid(){var h='<div class="grid">';for(var i=0;i<DATA.length;i++)h+=cardHTML(DATA[i],i);h+='</div>';var g=$('grid');g.className='';g.innerHTML=h}
function favTap(i,ev){ev.stopPropagation();favset[i]=!favset[i];ev.target.textContent=favset[i]?'♥':'♡'}

/* ---- ESQUELETOS ---- */
function skelHTML(){var c='<div class="skcard"><div class="skph shim"></div><div class="skln shim"></div><div class="skln s2 shim"></div></div>';var h='<div class="grid">';for(var i=0;i<9;i++)h+=c;h+='</div>';return h}
function reloadSkel(){var g=$('grid');g.className='';g.innerHTML=skelHTML();setTimeout(renderGrid,1300)}

/* ---- FICHA ---- */
function openCard(i){FICHA==='old'?openOld(DATA[i],i):openNew(DATA[i],i)}
function closeSheet(){$('sheet').classList.remove('on')}

function openOld(x,i){
 var SL={dt:'DonTorrent'};var sy=star(x);if(x.quality)sy+=' · '+x.quality;sy+=' · DonTorrent';
 var pst=x.poster?(' style="background-image:url('+x.poster+')"'):'';
 var fav=favset[i]?'♥ En mi lista':'♡ Añadir a mi lista';
 var h='<div class="old-pad">'+
   '<div class="old-poster"'+pst+'></div>'+
   '<h3>'+esc(x.title)+'</h3><div class="old-sy">'+sy+'</div>'+
   '<div class="seedtag s-ok">🌱 24 semillas</div>'+
   '<button class="btn play" onclick="toast(\'(demo) ▶ a la tele\')">▶ Reproducir en la tele</button>'+
   '<button class="btn fav" onclick="toast(\'(demo) lista\')">'+fav+'</button>'+
   '<button class="btn share" onclick="toast(\'(demo) compartir\')">📤 Compartir enlace</button>'+
   '<button class="btn cancel" onclick="closeSheet()">Cancelar</button></div>';
 $('sheetBox').innerHTML=h;$('sheet').classList.add('on');
}
function openNew(x,i){
 var hero=x.backdrop?(' style="background-image:url('+x.backdrop+')"'):(x.poster?(' style="background-image:url('+x.poster+')"'):'');
 var pst=x.poster?(' style="background-image:url('+x.poster+')"'):'';
 var sub=(x.year||'')+(x.rating?('  ·  ★'+x.rating):'')+(x.quality?('  ·  '+x.quality):'')+'  ·  DonTorrent';
 var genres=(x.genres||[]).map(function(g){return '<span class="gtag">'+esc(g)+'</span>'}).join('');
 var rt=x.runtime?('<span class="runt">'+(x.kind==='serie'?(x.seasons?x.seasons+' temporadas':''):(Math.floor(x.runtime/60)+'h '+(x.runtime%60)+'m'))+'</span>'):'';
 var ov=x.overview?('<div class="sh-ov clamp" id="ovtxt">'+esc(x.overview)+'</div><span class="sh-more" onclick="document.getElementById(\'ovtxt\').classList.toggle(\'clamp\');this.textContent=document.getElementById(\'ovtxt\').classList.contains(\'clamp\')?\'Leer más\':\'Leer menos\'">Leer más</span>'):'';
 var fav=favset[i]?'♥ En mi lista':'♡ Añadir a mi lista';
 var playLabel=x.kind==='serie'?'▶ Ver episodios':'▶ Reproducir en la tele';
 var trailerBtn=x.trailer?('<button class="btn trailer" style="flex:1;margin-top:0" onclick="openTr(\''+x.trailer+'\')">🎬 Tráiler</button>'):'';
 var h='<div class="sh-hero"'+hero+'><div class="grad"></div>'+
     '<div class="row"><div class="pst"'+pst+'></div>'+
     '<div><div class="ttl">'+esc(x.title)+'</div><div class="sub">'+sub+'</div></div></div></div>'+
   '<div class="sh-body">'+
     '<div class="sh-meta"><span class="seedtag s-ok">🌱 24 semillas</span>'+rt+'</div>'+
     '<div class="sh-meta">'+genres+'</div>'+
     ov+
     '<button class="btn play" onclick="toast(\'(demo) ▶ a la tele\')">'+playLabel+'</button>'+
     '<div class="btnrow"><button class="btn fav" style="flex:1;margin-top:0" onclick="favset['+i+']=!favset['+i+'];toast(\'(demo) lista\')">'+fav+'</button>'+trailerBtn+'</div>'+
     '<button class="btn share" onclick="toast(\'(demo) compartir\')">📤 Compartir enlace</button>'+
     '<button class="btn cancel" onclick="closeSheet()">Cancelar</button>'+
   '</div>';
 $('sheetBox').innerHTML=h;$('sheet').classList.add('on');$('sheet').querySelector('.box').scrollTop=0;
}
/* tráiler */
function openTr(key){$('trMount').innerHTML='<iframe src="https://www.youtube.com/embed/'+key+'?autoplay=1&rel=0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';$('tr').classList.add('on')}
function closeTr(){$('tr').classList.remove('on');$('trMount').innerHTML=''}

/* arranque: muestra esqueletos y rellena (demostración del pulido de carga) */
reloadSkel();
/* verificación: ?open=N abre la ficha N directamente (sin esqueleto) */
(function(){var m=new URLSearchParams(location.search);var o=m.get('open');if(o!==null){var i=parseInt(o,10)||0;$('grid').className='';renderGrid();setTimeout(function(){openCard(i)},80)}})();
</script>
